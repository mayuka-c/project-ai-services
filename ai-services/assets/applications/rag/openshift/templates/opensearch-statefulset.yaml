apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "opensearch"
  labels:
    ai-services.io/application: {{ .Release.Name }}
    ai-services.io/template: {{ .Chart.Name }}
    ai-services.io/version: {{ default .Chart.AppVersion | quote }}
    ai-services.io/component: vectordb
spec:
  serviceName: "opensearch-headless"
  podManagementPolicy: Parallel
  replicas: {{ .Values.opensearch.replicas }}
  persistentVolumeClaimRetentionPolicy:
    whenScaled: Delete
  selector:
    matchLabels:
      ai-services.io/application: {{ .Release.Name }}
      ai-services.io/component: vectordb
  template:
    metadata:
      labels:
        ai-services.io/application: {{ .Release.Name }}
        ai-services.io/template: {{ .Chart.Name }}
        ai-services.io/version: {{ default .Chart.AppVersion | quote }}
        ai-services.io/component: vectordb
    spec:
      # Give nodes time to migrate data before K8s kills the pod
      terminationGracePeriodSeconds: 300
      containers:
        - name: opensearch
          image: "{{ .Values.opensearch.image }}"
          lifecycle:
            preStop:
              exec:
                command:
                  - "/bin/bash"
                  - "-c"
                  - |
                    # Get admin password from env
                    AUTH="admin:$OPENSEARCH_INITIAL_ADMIN_PASSWORD"

                    # A. Exclude node from voting (Fixes Quorum/Cluster-Manager error)
                    curl -X POST "https://localhost:9200/_cluster/voting_config_exclusions?node_names=$HOSTNAME" \
                      -u "$AUTH" --insecure || true

                    # B. Exclude node from shard allocation (Moves data)
                    curl -X PUT "https://localhost:9200/_cluster/settings" \
                      -u "$AUTH" --insecure -H 'Content-Type: application/json' \
                      -d "{\"persistent\": {\"cluster.routing.allocation.exclude._name\": \"$HOSTNAME\"}}"

                    # C. Wait for shards to leave (Prevents data loss)
                    while [ $(curl -s -u "$AUTH" --insecure "https://localhost:9200/_cat/shards" | grep $HOSTNAME | wc -l) -gt 0 ]; do
                      echo "Waiting for shards to migrate..."
                      sleep 5
                    done
          env:
            - name: cluster.name
              value: opensearch-cluster
            - name: node.name
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: cluster.initial_master_nodes
              value: "{{ range $i := until (int .Values.opensearch.replicas) }}{{ if $i }},{{ end }}opensearch-{{ $i }}{{ end }}"
            - name: discovery.seed_hosts
              value: opensearch-headless
            - name: network.host
              value: 0.0.0.0
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "opensearch-credentials"
                  key: password
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms4g -Xmx4g -XX:MaxDirectMemorySize=2g -XX:-UseSuperWord -XX:TieredStopAtLevel=1"
          ports:
            - name: os-client-port
              containerPort: 9200
            - name: os-metrics-port
              containerPort: 9600
          resources:
            requests:
              cpu: "2"
              memory: "{{ .Values.opensearch.memoryLimit }}"
            limits:
              cpu: "2"
              memory: "{{ .Values.opensearch.memoryLimit }}"
          volumeMounts:
            - mountPath: /usr/share/opensearch/data
              name: data
          startupProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 9200
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 10
          readinessProbe:
            exec:
              command:
              - sh
              - -c
              - 'curl -fk -u "admin:${OPENSEARCH_INITIAL_ADMIN_PASSWORD}" https://localhost:9200/_cluster/health'
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          ai-services.io/application: {{ .Release.Name }}
          ai-services.io/template: {{ .Chart.Name }}
          ai-services.io/version: {{ default .Chart.AppVersion | quote }}
          ai-services.io/component: vectordb
      spec:
        accessModes:
          - ReadWriteMany
        resources:
          requests:
            storage: "{{ .Values.opensearch.storage }}"
